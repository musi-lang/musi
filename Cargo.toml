[package]
name = "musi"
version = "0.1.0"
description = "The Musi Programming Language"
repository = "https://github.com/musi-lang/musi"
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
keywords = ["musi", "programming language"]
categories = ["Programming Language"]
default-run = "musi"

[[bin]]
name = "musi"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.53", features = ["derive"] }
thiserror = "2.0.17"

[lints.rust]
keyword_idents_2024 = "forbid"
missing_unsafe_on_extern = "forbid"
unsafe_code = "forbid"
unsafe_op_in_unsafe_fn = "forbid"
unused_results = "forbid"

[lints.clippy]
absolute_paths = "forbid"
# arithmetic_side_effects = "forbid"  # use checked ops where overflow matters
as_conversions = "forbid"
as_pointer_underscore = "forbid"
as_underscore = "forbid"
cast_possible_truncation = "forbid"
cast_possible_wrap = "forbid"
cast_precision_loss = "forbid"
cast_sign_loss = "forbid"
clone_on_ref_ptr = "forbid"
dbg_macro = "forbid"
empty_drop = "forbid"
# exit = "forbid"  # CLI tools need exit codes
filetype_is_file = "forbid"
fn_to_numeric_cast_any = "forbid"
get_unwrap = "forbid"
# indexing_slicing = "forbid"  # use `.get()` in critical paths only
infinite_loop = "forbid"
let_underscore_must_use = "forbid"
mem_forget = "forbid"
missing_asserts_for_indexing = "forbid"
multiple_unsafe_ops_per_block = "forbid"
mutex_atomic = "forbid"
panic = "forbid"
rc_buffer = "forbid"
rc_mutex = "forbid"
str_to_string = "forbid"
string_slice = "forbid"
tests_outside_test_module = "forbid"
todo = "forbid"
try_err = "forbid"
undocumented_unsafe_blocks = "forbid"
unimplemented = "forbid"
unnecessary_safety_comment = "forbid"
unnecessary_safety_doc = "forbid"
unreachable = "forbid"
unwrap_in_result = "forbid"
# unwrap_used = "forbid"  # use `.expect()` in prod, but allow `.unwrap()` in tests/prototypes

cargo = { level = "forbid", priority = -1 }
complexity = { level = "forbid", priority = -1 }
correctness = { level = "forbid", priority = -1 }
nursery = { level = "forbid", priority = -1 }
pedantic = { level = "forbid", priority = -1 }
perf = { level = "forbid", priority = -1 }
style = { level = "forbid", priority = -1 }
suspicious = { level = "forbid", priority = -1 }

# https://doc.rust-lang.org/cargo/reference/profiles.html#profile-settings
[profile.release]
opt-level = "s"
debug = "full"
strip = "symbols"
lto = true
panic = "abort"
incremental = true
codegen-units = 1

[profile.bench]
codegen-units = 16
lto = "thin"
