[workspace]
members = [
    "crates/music-ast",
    "crates/music-basic",
    "crates/music-codegen",
    "crates/music-lex",
    "crates/music-parse",
    "crates/music-sema",
]
resolver = "2"

[workspace.package]
name = "musi"
version = "0.1.0"
description = "The Musi Programming Language"
repository = "https://github.com/musi-lang/musi"
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
keywords = ["musi", "programming language"]
categories = ["Programming Language"]
default-run = "musi"

[[workspace.bin]]
"name" = "musi"
"path" = "src/main.rs"

[workspace.dependencies]

[workspace.lints.rust]
ambiguous_negative_literals = "warn"
elided_lifetimes_in_paths = "warn"
keyword_idents_2024 = "warn"
missing_debug_implementations = "warn"
missing_unsafe_on_extern = "deny"
# non_exhaustive_omitted_patterns = "warn" # <https://github.com/rust-lang/rust/issues/89554>
unsafe_code = "deny"
unsafe_op_in_unsafe_fn = "deny"
unused_crate_dependencies = "warn"
unused_results = "warn"
variant_size_differences = "warn"

[workspace.lints.clippy]
absolute_paths = "deny"
alloc_instead_of_core = "deny"
allow_attributes = "deny"
allow_attributes_without_reason = "deny"
arbitrary_source_item_ordering = "warn"
arithmetic_side_effects = "deny"
as_conversions = "deny"
as_pointer_underscore = "deny"
as_underscore = "deny"
assertions_on_result_states = "deny"
big_endian_bytes = "warn"
cargo = { level = "forbid", priority = -1 }
cfg_not_test = "deny"
clone_on_ref_ptr = "deny"
complexity = { level = "deny", priority = -1 }
correctness = { level = "deny", priority = -1 }
create_dir = "deny"
dbg_macro = "deny"
decimal_literal_representation = "warn"
default_numeric_fallback = "warn"
default_union_representation = "deny"
deref_by_slicing = "warn"
disallowed_script_idents = "deny"
doc_include_without_cfg = "warn"
else_if_without_else = "warn"
empty_drop = "deny"
empty_enum_variants_with_brackets = "warn"
empty_structs_with_brackets = "warn"
error_impl_error = "deny"
exhaustive_enums = "warn"
exhaustive_structs = "warn"
exit = "deny"
expect_used = "deny"
field_scoped_visibility_modifiers = "warn"
filetype_is_file = "deny"
float_arithmetic = "warn"
float_cmp_const = "warn"
fn_to_numeric_cast_any = "deny"
format_push_string = "deny"
get_unwrap = "deny"
host_endian_bytes = "warn"
if_then_some_else_none = "deny"
impl_trait_in_params = "warn"
implicit_return = "allow"
indexing_slicing = "deny"
infinite_loop = "deny"
inline_asm_x86_att_syntax = "deny"
inline_asm_x86_intel_syntax = "deny"
integer_division = "warn"
integer_division_remainder_used = "warn"
iter_over_hash_type = "deny"
large_include_file = "warn"
let_underscore_must_use = "deny"
let_underscore_untyped = "warn"
little_endian_bytes = "warn"
lossy_float_literal = "warn"
map_err_ignore = "deny"
map_with_unused_argument_over_ranges = "warn"
mem_forget = "deny"
min_ident_chars = "warn"
missing_assert_message = "warn"
missing_asserts_for_indexing = "deny"
missing_docs_in_private_items = "allow"
missing_errors_doc = "allow"
missing_inline_in_public_items = "warn"
missing_panics_doc = "allow"
missing_trait_methods = "warn"
mixed_read_write_in_expression = "deny"
mod_module_files = "allow"
module_name_repetitions = "allow"
modulo_arithmetic = "warn"
multiple_inherent_impl = "warn"
multiple_unsafe_ops_per_block = "deny"
mutex_atomic = "deny"
needless_raw_strings = "warn"
non_ascii_literal = "warn"
non_zero_suggestions = "warn"
nursery = { level = "deny", priority = -1 }
panic = "deny"
panic_in_result_fn = "deny"
partial_pub_fields = "warn"
pathbuf_init_then_push = "warn"
pattern_type_mismatch = "warn"
pedantic = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
print_stderr = "deny"
print_stdout = "deny"
pub_use = "warn"
pub_with_shorthand = "warn"
pub_without_shorthand = "warn"
question_mark_used = "allow"
rc_buffer = "deny"
rc_mutex = "deny"
redundant_type_annotations = "warn"
ref_patterns = "warn"
renamed_function_params = "warn"
rest_pat_in_fully_bound_structs = "warn"
same_name_method = "warn"
self_named_module_files = "warn"
semicolon_inside_block = "warn"
semicolon_outside_block = "warn"
separated_literal_suffix = "warn"
shadow_reuse = "warn"
shadow_same = "warn"
shadow_unrelated = "warn"
single_call_fn = "warn"
single_char_lifetime_names = "warn"
std_instead_of_alloc = "allow"
std_instead_of_core = "allow"
str_to_string = "deny"
string_add = "deny"
string_lit_chars_any = "warn"
string_slice = "deny"
string_to_string = "deny"
style = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
suspicious_xor_used_as_pow = "deny"
tests_outside_test_module = "deny"
todo = "deny"
try_err = "deny"
undocumented_unsafe_blocks = "deny"
unimplemented = "deny"
unnecessary_safety_comment = "deny"
unnecessary_safety_doc = "deny"
unnecessary_self_imports = "warn"
unneeded_field_pattern = "warn"
unreachable = "deny"
unseparated_literal_suffix = "allow"
unused_result_ok = "deny"
unused_trait_names = "warn"
unwrap_in_result = "deny"
unwrap_used = "deny"
use_debug = "deny"
verbose_file_reads = "warn"
wildcard_enum_match_arm = "allow"

[profile.release]
panic = "abort"
lto = "fat"
incremental = false
codegen-units = 1
