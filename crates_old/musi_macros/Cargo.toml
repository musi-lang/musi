[package]
name = "musi_macros"
description = "Proc-macro for defining Musi native modules"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["compiler", "musi", "proc-macro"]
categories = ["development-tools"]

[lib]
proc-macro = true

[dependencies]
proc-macro2 = { workspace = true }
quote      = { workspace = true }
syn        = { workspace = true }

# Proc-macro crates need their own lint config; workspace lints conflict with
# how syn/quote generate and consume token streams.
[lints.rust]
unsafe_code      = "deny"
unused_results   = "forbid"

[lints.clippy]
cargo_common_metadata = "allow"
