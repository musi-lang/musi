<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script
			src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
			async
			defer
		></script>
		<script>
			(() => {
				const key = "musi-color-scheme";
				const stored = window.localStorage.getItem(key);
				const scheme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
				const resolved =
					scheme === "system"
						? window.matchMedia("(prefers-color-scheme: dark)").matches
							? "dark"
							: "light"
						: scheme;
				document.documentElement.dataset.colorScheme = scheme;
				document.documentElement.dataset.mantineColorScheme = resolved;
				document.documentElement.style.colorScheme = resolved;
			})();
		</script>
		<!-- SEO_HEAD_START -->
		<title>Musi</title>
		<meta
			name="description"
			content="Programming language built around first-class resumable effects."
		/>
		<link rel="canonical" href="https://musi-lang.org/" />
		<meta name="robots" content="index,follow" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Musi" />
		<meta
			property="og:description"
			content="Programming language built around first-class resumable effects."
		/>
		<meta property="og:url" content="https://musi-lang.org/" />

			name="twitter:description"
			content="Programming language built around first-class resumable effects."
		/>

		</script>
		<!-- SEO_HEAD_END -->
	</head>
	<body>

	</body>
</html>
