[package]
name = "musi-lsp"
description = "Language server for Musi compiler"
version.workspace = true
edition.workspace = true
repository.workspace = true
readme = "README.md"
license.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "musi_lsp"
path = "src/main.rs"

[dependencies]
async-lsp = "0.2.2"
tokio = { version = "1.48.0", features = ["full"] }
tokio-util = { version = "0.7.17", features = ["compat"] }
serde_json = "1.0.147"
tower = "0.5.2"
futures = "0.3.31"

musi-basic = { path = "../musi_basic" }
musi-lex = { path = "../musi_lex" }
musi-parse = { path = "../musi_parse" }
musi-ast = { path = "../musi_ast" }

[lints]
workspace = true
