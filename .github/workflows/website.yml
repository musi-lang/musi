name: Website

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/website.yml"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "www/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/website.yml"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "www/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run biome:lint
      - run: bun run build
